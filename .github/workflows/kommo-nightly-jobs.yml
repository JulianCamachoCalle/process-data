name: Kommo Nightly Jobs

on:
  workflow_dispatch:

jobs:
  kommo-sync-and-process:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.APP_BASE_URL || vars.APP_BASE_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET || secrets.SYNC_BEARER_TOKEN }}
    steps:
      - name: Compute Lima hour
        id: lima_time
        run: |
          echo "lima_hour=$(TZ=America/Lima date +%H)" >> $GITHUB_OUTPUT
          echo "lima_minute=$(TZ=America/Lima date +%M)" >> $GITHUB_OUTPUT

      - name: Validate nightly secrets/config
        id: cfg
        run: |
          set -euo pipefail

          if [ -z "${BASE_URL:-}" ]; then
            echo "::error::Missing APP_BASE_URL (set it as repository secret APP_BASE_URL or variable APP_BASE_URL)."
            exit 1
          fi

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::Missing CRON_SECRET (set CRON_SECRET or SYNC_BEARER_TOKEN in GitHub Actions secrets)."
            exit 1
          fi

          case "$BASE_URL" in
            http://*|https://*) ;;
            *)
              echo "::error::APP_BASE_URL must include protocol, e.g. https://your-domain.com"
              exit 1
              ;;
          esac

          normalized_base_url="${BASE_URL%/}"
          echo "base_url=${normalized_base_url}" >> "$GITHUB_OUTPUT"

      - name: Trigger process-events
        run: |
          set -euo pipefail
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${{ steps.cfg.outputs.base_url }}/api/kommo/process-events?loop=1&limit=120"

      - name: Trigger links leads sync at 03:05 Lima
        if: steps.lima_time.outputs.lima_hour == '03' && steps.lima_time.outputs.lima_minute == '05'
        run: |
          set -euo pipefail
          curl -fsS \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${{ steps.cfg.outputs.base_url }}/api/kommo/sync?resource=links&entity_type=leads&max_pages=3&max_entities=200&max_runtime_ms=45000"

      - name: Trigger links contacts sync at 03:15 Lima
        if: steps.lima_time.outputs.lima_hour == '03' && steps.lima_time.outputs.lima_minute == '15'
        run: |
          set -euo pipefail
          curl -fsS \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${{ steps.cfg.outputs.base_url }}/api/kommo/sync?resource=links&entity_type=contacts&max_pages=3&max_entities=200&max_runtime_ms=45000"

      - name: Trigger links companies sync at 03:25 Lima
        if: steps.lima_time.outputs.lima_hour == '03' && steps.lima_time.outputs.lima_minute == '25'
        run: |
          set -euo pipefail
          curl -fsS \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${{ steps.cfg.outputs.base_url }}/api/kommo/sync?resource=links&entity_type=companies&max_pages=3&max_entities=200&max_runtime_ms=45000"
